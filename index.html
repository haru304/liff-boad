<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 pb-20">
    <h1 class="font-bold mb-4">今日の人員状況</h1>
    <div id="count-bar" class="flex bg-white p-2 rounded shadow mb-6 overflow-x-auto text-center"></div>
    <div id="list" class="space-y-3"></div>

    <script>
        const GAS_URL = 'あなたのGASデプロイURL';

        async function load() {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            
            // 人数カウント
            const hours = new Array(24).fill(0);
            data.forEach(d => {
                const [s, e] = d.time.split('-').map(Number);
                if (s < e) for(let i=s; i<e; i++) hours[i]++;
            });
            document.getElementById('count-bar').innerHTML = hours.slice(9, 22).map((c, i) => `
                <div class="flex-1 min-w-[30px]"><div class="text-[10px] text-gray-400">${i+9}</div>
                <div class="font-bold ${c<2?'text-red-500':'text-blue-500'}">${c}</div></div>
            `).join('');

            // リスト表示
            document.getElementById('list').innerHTML = data.map(d => `
                <div class="bg-white p-3 rounded shadow border-l-4 ${d.isChanged?'border-orange-400':'border-blue-400'}">
                    <div class="flex gap-2 mb-2">
                        <input id="n-${d.id}" value="${d.name}" class="border rounded p-1 w-1/2">
                        <input id="t-${d.id}" value="${d.time}" class="border rounded p-1 w-1/2">
                    </div>
                    <div class="flex gap-2 text-xs">
                        <button onclick="save(${d.id}, 'today')" class="bg-gray-700 text-white p-2 rounded flex-1">今日だけ変更</button>
                        <button onclick="save(${d.id}, 'master')" class="bg-red-500 text-white p-2 rounded flex-1">固定を変更(鍵)</button>
                    </div>
                </div>
            `).join('');
        }

        async function save(id, type) {
            let pass = "";
            if (type === 'master') {
                pass = prompt("管理者パスワードを入力してください");
                if (!pass) return;
            }
            const body = { type, id, name: document.getElementById(`n-${id}`).value, time: document.getElementById(`t-${id}`).value, pass };
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
            location.reload();
        }
        load();
    </script>
</body>
</html>
