<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbx4uxrzu43hC88wXre40o6WuJX5mmuRiuZbdQaNA16gEbW8Db-436akuhIOYFnJOTvt/exec';
    let savedAdminPass = "";

    function switchTab(tab) {
        document.getElementById('view-today').classList.toggle('hidden', tab !== 'today');
        document.getElementById('view-master').classList.toggle('hidden', tab !== 'master');
        document.getElementById('tab-today').classList.toggle('active-tab', tab === 'today');
        document.getElementById('tab-master').classList.toggle('active-tab', tab === 'master');
        if (tab === 'master') {
            if (savedAdminPass === "") {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('master-content').classList.add('hidden');
            } else {
                loadMaster();
            }
        }
        if (tab === 'today') loadToday();
    }

    async function unlockMaster() {
        const passInput = document.getElementById('admin-pass').value;
        const btn = document.getElementById('auth-btn');
        const errorMsg = document.getElementById('auth-error');
        if (!passInput) return;
        btn.innerText = "確認中..."; btn.disabled = true;
        errorMsg.classList.add('hidden');
        try {
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'verify', pass: passInput }) });
            const text = await res.text();
            if (text === "success") {
                savedAdminPass = passInput;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('master-content').classList.remove('hidden');
                document.getElementById('admin-pass').value = "";
                loadMaster();
            } else {
                errorMsg.classList.remove('hidden');
                btn.innerText = "ロック解除"; btn.disabled = false;
            }
        } catch (e) {
            alert("通信エラー"); btn.innerText = "ロック解除"; btn.disabled = false;
        }
    }

    async function loadToday() {
        const list = document.getElementById('shift-list');
        const counter = document.getElementById('counter');
        list.innerHTML = '';
        counter.innerHTML = '<div class="text-center text-gray-500 text-xs">読み込み中...</div>';

        try {
            const res = await fetch(GAS_URL);
            const data = await res.json();

            const hours = Array(15).fill(0);
            data.forEach(s => {
                if (!s.time || !s.name || s.name === "なし" || s.name === "未定") return;
                const [start, end] = s.time.split('-').map(Number);
                if (start && end) for (let i = start; i < end; i++) if (i >= 9 && i <= 23) hours[i - 9]++;
            });
            counter.innerHTML = hours.map((n, i) => `
                <div class="flex flex-col items-center">
                    <div class="text-gray-400 mb-1">${i + 9}</div>
                    <div class="text-sm font-bold ${n === 0 ? 'text-red-500' : 'text-blue-600'}">${n}</div>
                </div>
            `).join('');

            data.forEach(s => {
                const card = document.createElement('div');
                const isTodayOnly = s.isTodayOnly;
                card.className = `p-4 rounded-lg shadow-sm border ${isTodayOnly ? 'bg-green-50 border-green-400' : s.isChanged ? 'bg-yellow-50 border-yellow-400' : 'bg-white border-gray-200'}`;
                card.innerHTML = `
                    ${isTodayOnly ? '<div class="text-xs text-green-600 font-bold mb-2">📌 今日だけ追加</div>' : ''}
                    <div class="flex gap-2 mb-3">
                        <input type="text" value="${s.time}" class="w-20 border border-gray-300 rounded p-2 text-sm font-bold text-center time-input" placeholder="9-18">
                        <input type="text" value="${s.name}" class="flex-1 border border-gray-300 rounded p-2 text-sm font-bold name-input" placeholder="名前">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="updateDaily('${s.id}', this)" class="flex-1 text-sm bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded transition-colors shadow">
                            ${s.isChanged ? '変更を上書き' : '今日だけ変更'}
                        </button>
                        <button onclick="deleteDaily('${s.id}', '${s.time}', this)" class="text-sm bg-red-100 hover:bg-red-200 text-red-600 font-bold px-3 py-2 rounded transition-colors border border-red-300" title="今日だけ削除">
                            🗑️
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });

            // 「今日だけ枠を追加」ボタン
            const addBtn = document.createElement('div');
            addBtn.className = 'mt-4';
            addBtn.innerHTML = `
                <button onclick="addTodaySlot()" class="w-full text-sm font-bold text-green-700 bg-green-50 border-2 border-dashed border-green-400 hover:bg-green-100 py-3 rounded-lg transition">
                    ＋ 今日だけ枠を追加
                </button>
            `;
            list.appendChild(addBtn);

        } catch (e) {
            counter.innerHTML = '<div class="text-red-500 text-xs">読み込みエラー。再読み込みしてください。</div>';
        }
    }

    async function addTodaySlot() {
        const time = prompt("新しい枠の時間を入力してください\n例: 9-18", "9-18");
        if (!time) return;
        const name = prompt("担当者名を入力してください", "");
        if (name === null) return;

        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'addDaily', time: time, name: name }) });
        loadToday();
    }

    async function deleteDaily(id, time, btn) {
        if (!confirm("この枠を今日だけ削除しますか？")) return;
        const card = btn.closest('div.p-4');
        btn.disabled = true; btn.innerText = "削除中...";

        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'deleteDaily', id: id, time: time }) });
        card.style.opacity = '0.3';
        setTimeout(() => loadToday(), 800);
    }

    async function updateDaily(id, btn) {
        const card = btn.closest('div.p-4');
        const time = card.querySelector('.time-input').value;
        const name = card.querySelector('.name-input').value;
        btn.disabled = true; btn.innerText = "送信中...";
        btn.classList.replace('bg-blue-600', 'bg-gray-400');
        await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'daily', id: id, time: time, name: name }) });
        location.reload();
    }

    async function loadMaster() {
        const list = document.getElementById('master-list');
        list.innerHTML = '<div class="text-center text-gray-500 py-10">設定データを読み込み中...</div>';
        const res = await fetch(GAS_URL + '?mode=allMaster');
        const data = await res.json();
        const days = ['月', '火', '水', '木', '金', '土', '日'];
        list.innerHTML = days.map(day => `
            <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                <h2 class="font-bold border-b-2 border-blue-500 pb-2 mb-3 text-gray-800">${day}曜日</h2>
                <div class="space-y-3 mb-3">
                    ${data.filter(d => d.day === day).map(d => `
                        <div class="flex gap-2 items-center">
                            <span class="text-xs text-gray-400 w-4">${d.id}</span>
                            <input type="text" value="${d.time}" class="w-16 border border-gray-300 rounded text-sm p-1 text-center m-time">
                            <input type="text" value="${d.name}" class="flex-1 border border-gray-300 rounded text-sm p-1 m-name">
                            <button onclick="updateMaster('${d.row}', this)" class="bg-gray-700 text-white px-3 py-1.5 rounded text-xs font-bold shadow hover:bg-gray-800">保存</button>
                        </div>
                    `).join('')}
                </div>
                <div class="text-right border-t pt-2">
                    <button onclick="addMasterSlot('${day}', this)" class="text-xs font-bold text-blue-600 bg-blue-50 px-3 py-1.5 rounded border border-blue-200 hover:bg-blue-100 transition">
                        ＋ ${day}曜日に枠を追加
                    </button>
                </div>
            </div>
        `).join('');
    }

    async function addMasterSlot(day, btn) {
        const time = prompt(`${day}曜日の新しい枠の時間を入力してください\n例: 9-18`, "9-18");
        if (!time) return;
        const name = prompt("担当者名を入力してください", "未定");
        if (!name) return;
        btn.innerText = "追加中..."; btn.disabled = true;
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'addMaster', day: day, time: time, name: name, pass: savedAdminPass }) });
        const text = await res.text();
        if (text === "auth_error") { alert("セッション切れです。再読み込みしてください。"); location.reload(); }
        else loadMaster();
    }

    async function updateMaster(row, btn) {
        const container = btn.parentElement;
        const time = container.querySelector('.m-time').value;
        const name = container.querySelector('.m-name').value;
        const originalText = btn.innerText;
        btn.innerText = "⏳"; btn.disabled = true;
        const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'directMaster', row: row, time: time, name: name, pass: savedAdminPass }) });
        const text = await res.text();
        if (text === "auth_error") { alert("セッション切れです。再読み込みしてください。"); location.reload(); }
        else {
            btn.innerText = "完了!"; btn.classList.replace('bg-gray-700', 'bg-green-500');
            setTimeout(() => { btn.innerText = originalText; btn.classList.replace('bg-green-500', 'bg-gray-700'); btn.disabled = false; }, 1500);
        }
    }

    loadToday();
</script>
