<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト状況確認ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-top: 4px solid #3b82f6; background: white; color: #3b82f6; }
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
        .edit-area { display: none; }
        .edit-area.open { display: block; }
    </style>
</head>
<body class="bg-gray-100 pb-24">
<div class="max-w-md mx-auto p-4">

    <div id="view-today">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-3 mb-3 flex items-center gap-1">
            <button onclick="changeDate(-1)" class="text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg px-3 py-2 font-bold text-base transition">&#9664;</button>
            <div class="flex-1 text-center">
                <input type="date" id="date-picker" class="text-sm font-bold text-gray-700 text-center bg-transparent border-none outline-none cursor-pointer w-full" onchange="loadToday()">
                <div id="date-label" class="text-xs text-gray-400 mt-0.5"></div>
            </div>
            <button onclick="changeDate(1)" class="text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg px-3 py-2 font-bold text-base transition">&#9654;</button>
        </div>

        <div id="counter" class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-4">
            <div class="text-center text-gray-400 text-xs">読み込み中...</div>
        </div>

        <div id="shift-list" class="space-y-2"></div>
    </div>

    <div id="view-master" class="hidden">
        <h1 class="text-xl font-bold mb-3 text-center text-gray-800">固定シフト設定</h1>

        <div id="auth-screen" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 text-center mt-8">
            <p class="text-sm font-bold text-gray-700 mb-4">&#128272; 管理者パスワード</p>
            <input type="password" id="admin-pass" class="border border-gray-300 p-2 rounded-lg w-full mb-4 text-center text-lg" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')unlockMaster()">
            <button onclick="unlockMaster()" id="auth-btn" class="bg-gray-800 hover:bg-gray-900 text-white px-6 py-2 rounded-lg font-bold w-full transition shadow">ロック解除</button>
            <p id="auth-error" class="text-red-500 text-xs mt-3 hidden font-bold">パスワードが違います</p>
        </div>

        <div id="master-content" class="hidden">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-3 mb-3">
                <div class="flex items-center mb-2">
                    <button onclick="changeMasterDay(-1)" class="text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg px-2 py-1 font-bold text-base transition">&#9664;</button>
                    <div class="flex-1 text-center font-bold text-base text-gray-800" id="master-day-label">月曜日</div>
                    <button onclick="changeMasterDay(1)" class="text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg px-2 py-1 font-bold text-base transition">&#9654;</button>
                </div>
                <div class="flex gap-1">
                    <button onclick="jumpMasterDay(0)" id="day-btn-0" class="flex-1 py-1.5 rounded-lg text-xs font-bold transition border">月</button>
                    <button onclick="jumpMasterDay(1)" id="day-btn-1" class="flex-1 py-1.5 rounded-lg text-xs font-bold transition border">火</button>
                    <button onclick="jumpMasterDay(2)" id="day-btn-2" class="flex-1 py-1.5 rounded-lg text-xs font-bold transition border">水</button>
                    <button onclick="jumpMasterDay(3)" id="day-btn-3" class="flex-1 py-1.5 rounded-lg text-xs font-bold transition border">木</button>
                    <button onclick="jumpMasterDay(4)" id="day-btn-4" class="flex-1 py-1.5 rounded-lg text-xs font-bold transition border">金</button>
                    <button onclick="jumpMasterDay(5)" id="day-btn-5" class="flex-1 py-1.5 rounded-lg text-xs font-bold transition border">土</button>
                    <button onclick="jumpMasterDay(6)" id="day-btn-6" class="flex-1 py-1.5 rounded-lg text-xs font-bold transition border">日</button>
                </div>
            </div>

            <div id="master-counter" class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-3"></div>

            <p class="text-xs text-center text-gray-400 font-bold mb-3">※基本シフトを編集します（パスワード必要）</p>
            <div id="master-list" class="space-y-2"></div>
            <button onclick="addMasterSlotCurrent()" class="mt-3 w-full text-sm font-bold text-blue-600 bg-blue-50 border-2 border-dashed border-blue-300 hover:bg-blue-100 py-3 rounded-xl transition">
                ＋ この曜日に枠を追加
            </button>
        </div>
    </div>
</div>

<div class="fixed bottom-0 left-0 right-0 bg-gray-200 flex border-t border-gray-300 h-16 shadow-[0_-2px_10px_rgba(0,0,0,0.1)]">
    <button onclick="switchTab('today')" id="tab-today" class="flex-1 flex flex-col items-center justify-center text-gray-500 active-tab font-bold">
        <span class="text-xl">&#128197;</span><span class="text-xs mt-1">シフト確認</span>
    </button>
    <button onclick="switchTab('master')" id="tab-master" class="flex-1 flex flex-col items-center justify-center text-gray-500 font-bold">
        <span class="text-xl">&#9881;&#65039;</span><span class="text-xs mt-1">固定設定</span>
    </button>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx4uxrzu43hC88wXre40o6WuJX5mmuRiuZbdQaNA16gEbW8Db-436akuhIOYFnJOTvt/exec';
let savedAdminPass = "";
const DAYS = ['月','火','水','木','金','土','日'];
let masterDayIndex = 0;
let allMasterData = [];

(function init() {
    const today = new Date();
    document.getElementById('date-picker').value = toInputDate(today);
    updateDateLabel(today);
    masterDayIndex = (today.getDay() + 6) % 7;
})();

function toInputDate(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function toGasDate(d) {
    return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
}
function updateDateLabel(d) {
    const dayNames = ['日','月','火','水','木','金','土'];
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(d); target.setHours(0,0,0,0);
    const diff = Math.round((target - today) / 86400000);
    const suffix = diff===0?'（今日）':diff===1?'（明日）':diff===-1?'（昨日）':'';
    document.getElementById('date-label').textContent = `${d.getMonth()+1}月${d.getDate()}日（${dayNames[d.getDay()]}）${suffix}`;
}
function getSelectedDate() {
    const [y,m,d] = document.getElementById('date-picker').value.split('-').map(Number);
    return new Date(y, m-1, d);
}
function changeDate(delta) {
    const d = getSelectedDate();
    d.setDate(d.getDate() + delta);
    document.getElementById('date-picker').value = toInputDate(d);
    updateDateLabel(d);
    loadToday();
}
function getCurrentGasDate() { return toGasDate(getSelectedDate()); }

function sanitizeTime(val) {
    const s = String(val || '').trim();
    return /^\d{1,2}(:\d{2})?-\d{1,2}(:\d{2})?$/.test(s) ? s : '';
}
function parseHour(str) {
    if (!str) return NaN;
    const parts = str.split(':');
    return Number(parts[0]) + (parts[1] ? Number(parts[1]) / 60 : 0);
}

function calcHourCounts(data) {
    const counts = Array(14).fill(0);
    data.forEach(s => {
        const t = sanitizeTime(s.time);
        if (!t || !s.name || s.name === 'なし' || s.name === '未定') return;
        const [startStr, endStr] = t.split('-');
        const st = parseHour(startStr), en = parseHour(endStr);
        if (isNaN(st) || isNaN(en)) return;
        for (let h = 0; h < 14; h++) {
            const hourStart = 9 + h;
            if (st < hourStart + 1 && en > hourStart) counts[h]++;
        }
    });
    return counts;
}

function buildBarChart(data) {
    const counts = calcHourCounts(data);
    const maxCount = Math.max(...counts, 1);
    const BAR_MAX_H = 52;

    // 0人=赤、それ以外=青　シンプルな2色
    function barColor(n) {
        if (n === 0) return { bg: '#fecaca', fill: '#ef4444', text: '#991b1b' };
        return { bg: '#dbeafe', fill: '#3b82f6', text: '#1e40af' };
    }

    const bars = counts.map((n, i) => {
        const hour = 9 + i;
        const c = barColor(n);
        const barH = n === 0 ? 6 : Math.max(16, Math.round((n / maxCount) * BAR_MAX_H));
        return `
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px">
            <div style="font-size:11px;font-weight:700;color:${c.text};min-height:14px;line-height:1">
                ${n > 0 ? n : ''}
            </div>
            <div style="width:100%;background:${c.bg};border-radius:4px;display:flex;align-items:flex-end;height:${BAR_MAX_H}px">
                <div style="width:100%;background:${c.fill};border-radius:4px;height:${barH}px"></div>
            </div>
            <div style="font-size:10px;color:#9ca3af;font-weight:600;line-height:1">${hour}</div>
        </div>`;
    }).join('');

    return `<div style="display:flex;gap:2px;align-items:flex-end">${bars}</div>`;
}

function switchTab(tab) {
    document.getElementById('view-today').classList.toggle('hidden', tab !== 'today');
    document.getElementById('view-master').classList.toggle('hidden', tab !== 'master');
    document.getElementById('tab-today').classList.toggle('active-tab', tab === 'today');
    document.getElementById('tab-master').classList.toggle('active-tab', tab === 'master');
    if (tab === 'master') {
        if (!savedAdminPass) {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('master-content').classList.add('hidden');
        } else { loadMaster(); }
    }
    if (tab === 'today') loadToday();
}

async function unlockMaster() {
    const pass = document.getElementById('admin-pass').value;
    if (!pass) return;
    const btn = document.getElementById('auth-btn');
    const err = document.getElementById('auth-error');
    btn.innerText = "確認中..."; btn.disabled = true; err.classList.add('hidden');
    try {
        const res = await fetch(GAS_URL, { method:'POST', body: JSON.stringify({type:'verify', pass}) });
        if (await res.text() === "success") {
            savedAdminPass = pass;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('master-content').classList.remove('hidden');
            document.getElementById('admin-pass').value = "";
            loadMaster();
        } else {
            err.classList.remove('hidden');
            btn.innerText = "ロック解除"; btn.disabled = false;
        }
    } catch(e) { alert("通信エラー"); btn.innerText = "ロック解除"; btn.disabled = false; }
}

function toggleEdit(id) {
    const editArea = document.getElementById('edit-' + id);
    const chevron  = document.getElementById('chev-' + id);
    const isOpen   = editArea.classList.contains('open');
    document.querySelectorAll('.edit-area.open').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.chev').forEach(el => {
        el.textContent = '変更'; el.style.background = '#f3f4f6'; el.style.color = '#374151';
    });
    if (!isOpen) {
        editArea.classList.add('open');
        chevron.textContent = '閉じる';
        chevron.style.background = '#fee2e2';
        chevron.style.color = '#dc2626';
    }
}

async function loadToday() {
    const d = getSelectedDate();
    updateDateLabel(d);
    const gasDate = toGasDate(d);
    const list = document.getElementById('shift-list');
    const counter = document.getElementById('counter');
    list.innerHTML = '';
    counter.innerHTML = '<div style="font-size:12px;color:#9ca3af;text-align:center">読み込み中...</div>';

    try {
        const res = await fetch(GAS_URL + '?date=' + gasDate);
        const data = await res.json();

        counter.innerHTML = buildBarChart(data);

        if (data.length === 0) {
            list.innerHTML = '<div class="text-center text-gray-400 text-sm py-8">この日のシフトはありません</div>';
        }

        data.forEach(s => {
            const time = sanitizeTime(s.time);
            const card = document.createElement('div');
            const borderColor = s.isTodayOnly ? '#86efac' : s.isChanged ? '#fde68a' : '#e5e7eb';
            const badgeHtml = s.isTodayOnly
                ? '<span style="font-size:10px;background:#dcfce7;color:#15803d;font-weight:700;padding:2px 7px;border-radius:99px">追加枠</span>'
                : s.isChanged
                ? '<span style="font-size:10px;background:#fef9c3;color:#a16207;font-weight:700;padding:2px 7px;border-radius:99px">変更済</span>'
                : '';

            card.style.cssText = `background:white;border-radius:12px;border:1.5px solid ${borderColor};overflow:hidden;`;
            card.innerHTML = `
                <div style="display:flex;align-items:center;padding:11px 14px;gap:10px">
                    <!-- 時間：固定幅で名前の開始位置を揃える -->
                    <div style="width:88px;min-width:88px;font-size:17px;font-weight:800;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
                        ${time || '未設定'}
                    </div>
                    <div style="flex:1;min-width:0">
                        <div style="font-size:15px;font-weight:700;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
                        ${badgeHtml ? `<div style="margin-top:3px">${badgeHtml}</div>` : ''}
                    </div>
                    <button id="chev-${s.id}" class="chev" onclick="toggleEdit('${s.id}')"
                        style="font-size:12px;font-weight:700;color:#374151;background:#f3f4f6;border:none;border-radius:8px;padding:6px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0">
                        変更
                    </button>
                </div>

                <div id="edit-${s.id}" class="edit-area" style="border-top:1px solid #f1f5f9;padding:14px;background:#f8fafc">
                    <div style="display:flex;gap:8px;margin-bottom:10px">
                        <div style="flex:0 0 100px">
                            <div style="font-size:11px;color:#94a3b8;margin-bottom:4px;font-weight:600">時間</div>
                            <input type="text" value="${time}" class="time-input"
                                style="width:100%;border:1.5px solid #cbd5e1;border-radius:8px;padding:8px;font-size:15px;font-weight:700;text-align:center;box-sizing:border-box;background:white"
                                placeholder="9-18">
                        </div>
                        <div style="flex:1">
                            <div style="font-size:11px;color:#94a3b8;margin-bottom:4px;font-weight:600">名前</div>
                            <input type="text" value="${s.name}" class="name-input"
                                style="width:100%;border:1.5px solid #cbd5e1;border-radius:8px;padding:8px;font-size:15px;font-weight:700;box-sizing:border-box;background:white"
                                placeholder="名前">
                        </div>
                    </div>
                    <div style="display:flex;gap:8px">
                        <button onclick="updateDaily('${s.id}', this)"
                            style="flex:1;background:#2563eb;color:white;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;cursor:pointer">
                            保存する
                        </button>
                        <button onclick="deleteDaily('${s.id}', this)"
                            style="background:#fef2f2;color:#ef4444;border:1.5px solid #fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer">
                            削除
                        </button>
                    </div>
                </div>
            `;
            list.appendChild(card);
        });

        const addBtn = document.createElement('div');
        addBtn.style.marginTop = '12px';
        addBtn.innerHTML = `
            <button onclick="addTodaySlot()"
                style="width:100%;font-size:14px;font-weight:700;color:#15803d;background:#f0fdf4;border:2px dashed #4ade80;border-radius:12px;padding:13px;cursor:pointer">
                ＋ 枠を追加（分割・応援など）
            </button>
        `;
        list.appendChild(addBtn);

    } catch(e) {
        counter.innerHTML = '<div style="color:#ef4444;font-size:12px;text-align:center">読み込みエラー。再度お試しください。</div>';
    }
}

async function addTodaySlot() {
    const time = prompt('新しい枠の時間を入力してください\n例: 9-18 や 9:30-17:30', '9-18');
    if (time === null) return;
    const name = prompt('担当者名を入力してください', '');
    if (name === null) return;
    await fetch(GAS_URL, { method:'POST', body: JSON.stringify({type:'addDaily', time, name, date: getCurrentGasDate()}) });
    loadToday();
}

async function deleteDaily(id, btn) {
    if (!confirm('この枠を削除しますか？\n（固定シフトは翌日から元に戻ります）')) return;
    const card = btn.closest('div[style*="border-radius:12px"]');
    btn.disabled = true; btn.innerText = '削除中...';
    await fetch(GAS_URL, { method:'POST', body: JSON.stringify({type:'deleteDaily', id, date: getCurrentGasDate()}) });
    card.style.opacity = '0.3';
    setTimeout(() => loadToday(), 700);
}

async function updateDaily(id, btn) {
    const editArea = document.getElementById('edit-' + id);
    const time = editArea.querySelector('.time-input').value;
    const name = editArea.querySelector('.name-input').value;
    btn.disabled = true; btn.innerText = '保存中...';
    btn.style.background = '#9ca3af';
    await fetch(GAS_URL, { method:'POST', body: JSON.stringify({type:'daily', id, time, name, date: getCurrentGasDate()}) });
    loadToday();
}

function changeMasterDay(delta) {
    masterDayIndex = (masterDayIndex + delta + 7) % 7;
    renderMasterDay();
}
function jumpMasterDay(index) {
    masterDayIndex = index;
    renderMasterDay();
}
async function loadMaster() {
    document.getElementById('master-list').innerHTML =
        '<div class="text-center text-gray-400 py-6 text-sm">読み込み中...</div>';
    const res = await fetch(GAS_URL + '?mode=allMaster');
    allMasterData = await res.json();
    renderMasterDay();
}
function renderMasterDay() {
    const day = DAYS[masterDayIndex];
    document.getElementById('master-day-label').textContent = `${day}曜日`;
    DAYS.forEach((_, i) => {
        const btn = document.getElementById(`day-btn-${i}`);
        if (!btn) return;
        const isSel=i===masterDayIndex, isSat=i===5, isSun=i===6;
        if (isSel) btn.className='flex-1 py-1.5 rounded-lg text-xs font-bold transition border bg-blue-600 text-white border-blue-600';
        else if (isSun) btn.className='flex-1 py-1.5 rounded-lg text-xs font-bold transition border text-red-500 border-gray-200 hover:bg-red-50';
        else if (isSat) btn.className='flex-1 py-1.5 rounded-lg text-xs font-bold transition border text-blue-500 border-gray-200 hover:bg-blue-50';
        else btn.className='flex-1 py-1.5 rounded-lg text-xs font-bold transition border text-gray-600 border-gray-200 hover:bg-gray-50';
    });
    const dayData = allMasterData.filter(d => d.day === day);
    document.getElementById('master-counter').innerHTML = buildBarChart(dayData);
    const list = document.getElementById('master-list');
    if (dayData.length === 0) {
        list.innerHTML = '<div class="text-center text-gray-400 text-sm py-4">この曜日の枠はありません</div>';
        return;
    }
    list.innerHTML = dayData.map(d => {
        const t = sanitizeTime(d.time);
        return `
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-3">
            <div class="flex gap-2 items-center">
                <input type="text" value="${t}" class="m-time"
                    style="width:84px;border:1px solid #d1d5db;border-radius:8px;padding:6px 8px;font-size:14px;font-weight:700;text-align:center"
                    placeholder="9-18">
                <input type="text" value="${d.name}" class="m-name"
                    style="flex:1;border:1px solid #d1d5db;border-radius:8px;padding:6px 8px;font-size:14px;font-weight:700">
                <button onclick="updateMaster('${d.row}', this)"
                    style="background:#374151;color:white;border:none;border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0">保存</button>
            </div>
        </div>`;
    }).join('');
}

async function addMasterSlotCurrent() {
    const day = DAYS[masterDayIndex];
    const time = prompt(`${day}曜日・新しい枠の時間\n例: 9-18 や 9:30-17:30`, '9-18');
    if (time === null) return;
    const name = prompt('担当者名（未定の場合は「未定」など）', '未定');
    if (name === null) return;
    const res = await fetch(GAS_URL, { method:'POST', body: JSON.stringify({type:'addMaster', day, time, name, pass: savedAdminPass}) });
    const text = await res.text();
    if (text === 'auth_error') { alert('セッション切れです。再読み込みしてください。'); location.reload(); return; }
    await loadMaster();
}

async function updateMaster(row, btn) {
    const rowDiv = btn.parentElement;
    const time = rowDiv.querySelector('.m-time').value;
    const name = rowDiv.querySelector('.m-name').value;
    const orig = btn.innerText;
    btn.innerText = '⏳'; btn.disabled = true;
    const res = await fetch(GAS_URL, { method:'POST', body: JSON.stringify({type:'directMaster', row, time, name, pass: savedAdminPass}) });
    const text = await res.text();
    if (text === 'auth_error') { alert('セッション切れです。再読み込みしてください。'); location.reload(); return; }
    const idx = allMasterData.findIndex(d => String(d.row) === String(row));
    if (idx >= 0) { allMasterData[idx].time = time; allMasterData[idx].name = name; }
    btn.innerText = '完了!'; btn.style.background = '#16a34a';
    setTimeout(() => { btn.innerText = orig; btn.style.background = '#374151'; btn.disabled = false; }, 1500);
}

loadToday();
</script>
</body>
</html>
