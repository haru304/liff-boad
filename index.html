<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト状況</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 pb-20">
    <div class="max-w-md mx-auto p-4">
        <h1 class="text-xl font-bold mb-4 text-center">今日の人員状況</h1>
        
        <div id="counter" class="bg-white p-3 rounded-lg shadow mb-4 flex justify-around text-xs border-t-4 border-blue-500">
            <div class="text-center">読み込み中...</div>
        </div>

        <div id="shift-list" class="space-y-3"></div>
    </div>

    <script>
        const GAS_URL = 'あなたのGASデプロイURL'; // ★ここを最新のURLに書き換える

        async function loadShifts() {
            const res = await fetch(GAS_URL);
            const data = await res.json();
            render(data);
        }

        function render(data) {
            const list = document.getElementById('shift-list');
            const counter = document.getElementById('counter');
            list.innerHTML = '';
            
            // 人数カウント計算
            const hours = Array(15).fill(0); // 9時〜23時
            data.forEach(s => {
                if(!s.time || !s.name) return;
                const [start, end] = s.time.split('-').map(Number);
                for(let i=start; i<end; i++) if(i>=9 && i<=23) hours[i-9]++;
            });
            
            counter.innerHTML = hours.map((n, i) => `
                <div><div class="text-gray-500">${i+9}</div><div class="font-bold ${n==0?'text-red-400':'text-blue-600'}">${n}</div></div>
            `).join('');

            // カード表示
            data.forEach(s => {
                const card = document.createElement('div');
                card.className = `p-4 rounded-lg shadow ${s.isChanged ? 'bg-yellow-50 border-l-4 border-yellow-400' : 'bg-white'}`;
                card.innerHTML = `
                    <div class="flex gap-2 mb-2">
                        <input type="text" value="${s.time}" class="w-20 border rounded p-1 text-sm time-input">
                        <input type="text" value="${s.name}" class="flex-1 border rounded p-1 text-sm name-input">
                    </div>
                    <div class="flex justify-end gap-2">
                        <button onclick="update('${s.id}', this, 'daily')" class="text-xs bg-blue-500 text-white px-3 py-1 rounded">今日だけ変更</button>
                        <button onclick="update('${s.id}', this, 'master')" class="text-xs bg-gray-400 text-white px-3 py-1 rounded">毎週変更</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        async function update(id, btn, type) {
            const card = btn.parentElement.parentElement;
            const time = card.querySelector('.time-input').value;
            const name = card.querySelector('.name-input').value;
            let pass = "";
            if(type === 'master') pass = prompt("管理用パスワードを入力");

            btn.disabled = true;
            btn.innerText = "送信中...";
            
            await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ type, id, time, name, pass })
            });
            
            location.reload();
        }

        loadShifts();
    </script>
</body>
</html>
