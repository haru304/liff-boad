<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シフト状況確認ツール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-top: 4px solid #3b82f6; background: white; color: #3b82f6; }
        input[type="date"]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }
        .time-mono { font-family: 'Courier New', Courier, monospace; }
        .edit-input { display:none; }
        .edit-mode .edit-input { display:block; }
        .edit-mode .view-text { display:none; }
        #save-bar { display:none; }
        .cal-cell { min-height:52px; cursor:pointer; border-radius:8px; padding:4px; transition:background 0.15s; }
        .cal-cell:hover { background:#f1f5f9; }
        .cal-cell.selected { background:#eff6ff; outline:2px solid #3b82f6; }
    </style>
</head>
<body class="bg-gray-100 pb-20">
<div class="max-w-md mx-auto p-4">

    <!-- ===== シフト確認 ===== -->
    <div id="view-today">

        <!-- 日付ナビ（単独カード） -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-3 mb-3 flex items-center gap-1">
            <button onclick="changeDate(-1)" class="text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg px-3 py-2 font-bold text-base transition">&#9664;</button>
            <div class="flex-1 text-center">
                <input type="date" id="date-picker" class="text-sm font-bold text-gray-700 text-center bg-transparent border-none outline-none cursor-pointer w-full" onchange="onDateChange()">
                <div id="date-label" class="text-xs text-gray-400 mt-0.5"></div>
            </div>
            <button onclick="changeDate(1)" class="text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg px-3 py-2 font-bold text-base transition">&#9654;</button>
        </div>

        <!-- バーグラフ -->
        <div id="counter" class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-3">
            <div class="text-center text-gray-400 text-xs">読み込み中...</div>
        </div>

        <!-- 休日トグル（カウンターの下・日付ナビと離す） -->
        <div class="mb-3">
            <button id="holiday-toggle" onclick="toggleHoliday()"
                style="width:100%;padding:9px;border-radius:10px;border:1.5px solid #e5e7eb;font-size:13px;font-weight:700;color:#6b7280;background:#f9fafb;cursor:pointer">
                この日を休日扱いにする（6時〜表示）
            </button>
        </div>

        <!-- 変更ボタン -->
        <div id="edit-toggle-row" class="hidden justify-end mb-2">
            <button id="edit-toggle-btn" onclick="toggleEditMode()"
                style="font-size:12px;font-weight:700;color:#374151;background:#f3f4f6;border:none;border-radius:8px;padding:7px 16px;cursor:pointer">
                変更する
            </button>
        </div>

        <!-- シフト一覧 -->
        <div id="shift-list" class="space-y-2"></div>
    </div>

    <!-- ===== 代行表 ===== -->
    <div id="view-daiko" class="hidden">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-3 mb-3 flex items-center">
            <button onclick="changeCalMonth(-1)" class="text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg px-3 py-2 font-bold transition">&#9664;</button>
            <div class="flex-1 text-center font-bold text-base text-gray-800" id="cal-month-label"></div>
            <button onclick="changeCalMonth(1)"  class="text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg px-3 py-2 font-bold transition">&#9654;</button>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-3 mb-3">
            <div class="grid grid-cols-7 mb-1">
                <div class="text-center text-xs font-bold text-red-400 py-1">日</div>
                <div class="text-center text-xs font-bold text-gray-500 py-1">月</div>
                <div class="text-center text-xs font-bold text-gray-500 py-1">火</div>
                <div class="text-center text-xs font-bold text-gray-500 py-1">水</div>
                <div class="text-center text-xs font-bold text-gray-500 py-1">木</div>
                <div class="text-center text-xs font-bold text-gray-500 py-1">金</div>
                <div class="text-center text-xs font-bold text-blue-400 py-1">土</div>
            </div>
            <div id="cal-grid" class="grid grid-cols-7 gap-0.5"></div>
        </div>

        <div id="daiko-detail" class="hidden">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-3">
                <div class="flex items-center justify-between mb-3">
                    <div id="daiko-date-label" class="font-bold text-gray-800 text-sm"></div>
                    <button onclick="openCreateDaiko()"
                        style="font-size:12px;font-weight:700;color:white;background:#ef4444;border:none;border-radius:8px;padding:6px 14px;cursor:pointer">
                        ＋ 募集を出す
                    </button>
                </div>
                <div id="daiko-list" class="space-y-2">
                    <div class="text-center text-gray-400 text-sm py-4">募集はありません</div>
                </div>
            </div>
        </div>

        <div class="flex gap-4 justify-center mt-2">
            <div class="flex items-center gap-1">
                <div style="width:10px;height:10px;border-radius:50%;background:#ef4444"></div>
                <span class="text-xs text-gray-500">募集中</span>
            </div>
            <div class="flex items-center gap-1">
                <div style="width:10px;height:10px;border-radius:50%;background:#10b981"></div>
                <span class="text-xs text-gray-500">代行決定</span>
            </div>
        </div>
    </div>

    <!-- ===== 固定設定 ===== -->
    <div id="view-master" class="hidden">
        <h1 class="text-xl font-bold mb-3 text-center text-gray-800">固定シフト設定</h1>
        <div id="auth-screen" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 text-center mt-8">
            <p class="text-sm font-bold text-gray-700 mb-4">&#128272; 管理者パスワード</p>
            <input type="password" id="admin-pass" class="border border-gray-300 p-2 rounded-lg w-full mb-4 text-center text-lg" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')unlockMaster()">
            <button onclick="unlockMaster()" id="auth-btn" class="bg-gray-800 hover:bg-gray-900 text-white px-6 py-2 rounded-lg font-bold w-full transition shadow">ロック解除</button>
            <p id="auth-error" class="text-red-500 text-xs mt-3 hidden font-bold">パスワードが違います</p>
        </div>
        <div id="master-content" class="hidden">
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-3 mb-3">
                <div class="flex items-center mb-2">
                    <button onclick="changeMasterDay(-1)" class="text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg px-2 py-1 font-bold text-base transition">&#9664;</button>
                    <div class="flex-1 text-center font-bold text-base text-gray-800" id="master-day-label">月曜日</div>
                    <button onclick="changeMasterDay(1)" class="text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg px-2 py-1 font-bold text-base transition">&#9654;</button>
                </div>
                <div class="flex gap-1">
                    <button onclick="jumpMasterDay(0)" id="day-btn-0" class="flex-1 py-1.5 rounded-lg text-xs font-bold transition border">月</button>
                    <button onclick="jumpMasterDay(1)" id="day-btn-1" class="flex-1 py-1.5 rounded-lg text-xs font-bold transition border">火</button>
                    <button onclick="jumpMasterDay(2)" id="day-btn-2" class="flex-1 py-1.5 rounded-lg text-xs font-bold transition border">水</button>
                    <button onclick="jumpMasterDay(3)" id="day-btn-3" class="flex-1 py-1.5 rounded-lg text-xs font-bold transition border">木</button>
                    <button onclick="jumpMasterDay(4)" id="day-btn-4" class="flex-1 py-1.5 rounded-lg text-xs font-bold transition border">金</button>
                    <button onclick="jumpMasterDay(5)" id="day-btn-5" class="flex-1 py-1.5 rounded-lg text-xs font-bold transition border">土</button>
                    <button onclick="jumpMasterDay(6)" id="day-btn-6" class="flex-1 py-1.5 rounded-lg text-xs font-bold transition border">日</button>
                </div>
            </div>
            <div id="master-counter" class="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-3"></div>
            <p class="text-xs text-center text-gray-400 font-bold mb-3">※基本シフトを編集します（パスワード必要）</p>
            <div id="master-list" class="space-y-2"></div>
            <button onclick="addMasterSlotCurrent()" class="mt-3 w-full text-sm font-bold text-blue-600 bg-blue-50 border-2 border-dashed border-blue-300 hover:bg-blue-100 py-3 rounded-xl transition">
                ＋ この曜日に枠を追加
            </button>
        </div>
    </div>
</div>

<!-- 一括保存バー -->
<div id="save-bar" class="fixed items-center justify-between gap-3 left-0 right-0 bg-white border-t-2 border-blue-400 px-4 py-3 shadow-lg" style="bottom:64px;max-width:448px;margin:0 auto">
    <div style="font-size:13px;font-weight:700;color:#1e40af">変更中</div>
    <div style="display:flex;gap:8px">
        <button onclick="cancelEditMode()" style="font-size:13px;font-weight:700;color:#6b7280;background:#f3f4f6;border:none;border-radius:8px;padding:8px 14px;cursor:pointer">キャンセル</button>
        <button onclick="bulkSave()" id="bulk-save-btn" style="font-size:13px;font-weight:700;color:white;background:#2563eb;border:none;border-radius:8px;padding:8px 20px;cursor:pointer">保存する</button>
    </div>
</div>

<!-- タブバー -->
<div class="fixed bottom-0 left-0 right-0 bg-gray-200 flex border-t border-gray-300 h-16 shadow-[0_-2px_10px_rgba(0,0,0,0.1)]">
    <button onclick="switchTab('today')" id="tab-today" class="flex-1 flex flex-col items-center justify-center text-gray-500 active-tab font-bold">
        <span class="text-lg">&#128197;</span><span class="text-xs mt-0.5">シフト</span>
    </button>
    <button onclick="switchTab('daiko')" id="tab-daiko" class="flex-1 flex flex-col items-center justify-center text-gray-500 font-bold">
        <span class="text-lg">&#128101;</span><span class="text-xs mt-0.5">代行表</span>
    </button>
    <button onclick="switchTab('master')" id="tab-master" class="flex-1 flex flex-col items-center justify-center text-gray-500 font-bold">
        <span class="text-lg">&#9881;&#65039;</span><span class="text-xs mt-0.5">固定設定</span>
    </button>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx4uxrzu43hC88wXre40o6WuJX5mmuRiuZbdQaNA16gEbW8Db-436akuhIOYFnJOTvt/exec';
let savedAdminPass = "";
const DAYS = ['月','火','水','木','金','土','日'];
let masterDayIndex = 0;
let allMasterData  = [];
let currentAbortController = null;
let isEditMode = false;
let isHoliday  = false;
let calYear, calMonth;
let selectedDate = null;
let daikoData    = [];

// ---- キャッシュ ----
const CACHE_MASTER_KEY = 'sc_master_v2';
function cacheKey(dateStr) { return 'sc_daily_' + dateStr; }
function daikoCacheKey(ym) { return 'sc_daiko_' + ym; }
function saveCache(key, data) {
    try { localStorage.setItem(key, JSON.stringify({ ts: Date.now(), data })); } catch(e) {}
}
function loadCache(key, maxAgeMs) {
    try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        const obj = JSON.parse(raw);
        if (Date.now() - obj.ts > maxAgeMs) return null;
        return obj.data;
    } catch(e) { return null; }
}
function clearCache(key) { try { localStorage.removeItem(key); } catch(e) {} }

// ---- 初期化 ----
(function init() {
    const today = new Date();
    document.getElementById('date-picker').value = toInputDate(today);
    updateDateLabel(today);
    masterDayIndex = (today.getDay() + 6) % 7;
    calYear  = today.getFullYear();
    calMonth = today.getMonth();
})();

function toInputDate(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function toGasDate(d) {
    return d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0') + '/' + String(d.getDate()).padStart(2,'0');
}
function parseDateSafe(str) {
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m-1, d);
}
function updateDateLabel(d) {
    const dayNames = ['日','月','火','水','木','金','土'];
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(d); target.setHours(0,0,0,0);
    const diff = Math.round((target - today) / 86400000);
    const suffix = diff===0?'（今日）':diff===1?'（明日）':diff===-1?'（昨日）':'';
    document.getElementById('date-label').textContent =
        `${d.getMonth()+1}月${d.getDate()}日（${dayNames[d.getDay()]}）${suffix}`;
}
function getSelectedDate() { return parseDateSafe(document.getElementById('date-picker').value); }
function onDateChange() {
    cancelEditMode(); isHoliday = false; updateHolidayToggle();
    updateDateLabel(getSelectedDate()); loadToday();
}
function changeDate(delta) {
    cancelEditMode(); isHoliday = false; updateHolidayToggle();
    const d = getSelectedDate(); d.setDate(d.getDate() + delta);
    document.getElementById('date-picker').value = toInputDate(d);
    updateDateLabel(d); loadToday();
}
function getCurrentGasDate() { return toGasDate(getSelectedDate()); }

// ---- 休日トグル（表示範囲を6時〜に変えるだけ。データは変えない） ----
function toggleHoliday() {
    cancelEditMode();
    isHoliday = !isHoliday;
    updateHolidayToggle();
    // キャッシュは同じキーを使う（データは同じなので再取得不要、バーだけ再描画）
    const cached = loadCache(cacheKey(getCurrentGasDate()), 5 * 60 * 1000);
    if (cached) {
        document.getElementById('counter').innerHTML = buildBarChart(cached, isHoliday);
    }
}
function updateHolidayToggle() {
    const btn = document.getElementById('holiday-toggle');
    if (isHoliday) {
        btn.style.background = '#fef2f2'; btn.style.borderColor = '#fca5a5';
        btn.style.color = '#dc2626'; btn.textContent = '休日扱い中：6時〜表示（タップで解除）';
    } else {
        btn.style.background = '#f9fafb'; btn.style.borderColor = '#e5e7eb';
        btn.style.color = '#6b7280'; btn.textContent = 'この日を休日扱いにする（6時〜表示）';
    }
}

// ---- 時間パース ----
function sanitizeTime(val) {
    const s = String(val||'').trim();
    return /^\d{1,2}(:\d{2})?-\d{1,2}(:\d{2})?$/.test(s) ? s : '';
}
function parseHour(str) {
    if (!str) return NaN;
    const [h,m] = str.split(':');
    return Number(h) + (m ? Number(m)/60 : 0);
}
function parseTimeRange(t) {
    const s = sanitizeTime(t); if (!s) return null;
    const [a,b] = s.split('-');
    const st=parseHour(a), en=parseHour(b);
    return (isNaN(st)||isNaN(en)) ? null : {st,en};
}

// ---- バーグラフ（holiday=trueのとき minH=6 に固定） ----
function calcCounts(data, startH, endH) {
    const counts = Array(endH - startH).fill(0);
    data.forEach(s => {
        const tr = parseTimeRange(s.time);
        if (!tr || !s.name || s.name==='なし' || s.name==='未定') return;
        const br = s.brk ? parseTimeRange(s.brk) : null;
        for (let h=0; h<counts.length; h++) {
            const hs = startH + h;
            if (tr.st < hs+1 && tr.en > hs && !(br && br.st < hs+1 && br.en > hs)) counts[h]++;
        }
    });
    return counts;
}
function buildBarChart(data, holiday) {
    // 休日扱いのときは開始を6時に固定、それ以外はデータから自動計算
    let minH = holiday ? 6 : 9;
    let maxH  = 22;
    data.forEach(s => {
        const tr = parseTimeRange(s.time); if (!tr) return;
        if (!holiday && Math.floor(tr.st) < minH) minH = Math.max(6, Math.floor(tr.st));
        if (Math.ceil(tr.en) > maxH) maxH = Math.min(25, Math.ceil(tr.en));
    });
    const counts = calcCounts(data, minH, maxH);
    const mx = Math.max(...counts, 1), BH = 48;
    return '<div style="display:flex;gap:2px">' + counts.map((n,i) => {
        const h=minH+i, bh=n===0?5:Math.max(14,Math.round(n/mx*BH));
        const fill=n===0?'#ef4444':'#3b82f6', bg=n===0?'#fecaca':'#dbeafe', tc=n===0?'#991b1b':'#1e40af';
        return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:0">
            <div style="font-size:10px;font-weight:700;color:${tc};min-height:13px;line-height:1">${n>0?n:''}</div>
            <div style="width:100%;background:${bg};border-radius:3px;display:flex;align-items:flex-end;height:${BH}px">
                <div style="width:100%;background:${fill};border-radius:3px;height:${bh}px"></div>
            </div>
            <div style="font-size:9px;color:#9ca3af;font-weight:600;line-height:1">${h}</div>
        </div>`;
    }).join('') + '</div>';
}

// ---- タブ ----
function switchTab(tab) {
    cancelEditMode();
    ['today','daiko','master'].forEach(t => {
        document.getElementById('view-'+t).classList.toggle('hidden', t!==tab);
        document.getElementById('tab-'+t).classList.toggle('active-tab', t===tab);
    });
    if (tab==='master') {
        if (!savedAdminPass) {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('master-content').classList.add('hidden');
        } else loadMaster();
    }
    if (tab==='today') loadToday();
    if (tab==='daiko') loadDaikoMonth();
}

// ---- 認証 ----
async function unlockMaster() {
    const pass=document.getElementById('admin-pass').value; if(!pass)return;
    const btn=document.getElementById('auth-btn'), err=document.getElementById('auth-error');
    btn.innerText="確認中..."; btn.disabled=true; err.classList.add('hidden');
    try {
        const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({type:'verify',pass})});
        if(await res.text()==="success"){
            savedAdminPass=pass;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('master-content').classList.remove('hidden');
            document.getElementById('admin-pass').value="";
            loadMaster();
        } else { err.classList.remove('hidden'); btn.innerText="ロック解除"; btn.disabled=false; }
    } catch(e){alert("通信エラー");btn.innerText="ロック解除";btn.disabled=false;}
}

// ---- 編集モード ----
function toggleEditMode(){ isEditMode ? cancelEditMode() : enterEditMode(); }
function enterEditMode(){
    isEditMode=true;
    document.getElementById('shift-list').classList.add('edit-mode');
    document.getElementById('edit-toggle-btn').textContent='編集中...';
    document.getElementById('edit-toggle-btn').style.background='#fee2e2';
    document.getElementById('edit-toggle-btn').style.color='#dc2626';
    document.getElementById('save-bar').style.display='flex';
}
function cancelEditMode(){
    isEditMode=false;
    const sl=document.getElementById('shift-list');
    if(sl) sl.classList.remove('edit-mode');
    const b=document.getElementById('edit-toggle-btn');
    if(b){b.textContent='変更する';b.style.background='#f3f4f6';b.style.color='#374151';}
    document.getElementById('save-bar').style.display='none';
}
async function bulkSave(){
    const btn=document.getElementById('bulk-save-btn');
    btn.innerText='保存中...'; btn.disabled=true;
    const items=[];
    document.querySelectorAll('#shift-list [data-shift-id]').forEach(card=>{
        items.push({id:card.dataset.shiftId,
            time:card.querySelector('.time-input').value,
            brk:card.querySelector('.brk-input').value,
            name:card.querySelector('.name-input').value});
    });
    try {
        clearCache(cacheKey(getCurrentGasDate()));
        await fetch(GAS_URL,{method:'POST',body:JSON.stringify({type:'dailyBulk',items,date:getCurrentGasDate()})});
        cancelEditMode(); loadToday();
    } catch(e){alert('保存エラー');}
    finally{btn.innerText='保存する';btn.disabled=false;}
}

// ---- シフトカード描画 ----
function renderShiftCard(s){
    const time=sanitizeTime(s.time), brk=sanitizeTime(s.brk||'');
    const card=document.createElement('div');
    card.dataset.shiftId=s.id;
    const bc=s.isTodayOnly?'#86efac':s.isChanged?'#fde68a':'#e5e7eb';
    const badge=s.isTodayOnly
        ?'<span style="font-size:10px;background:#dcfce7;color:#15803d;font-weight:700;padding:2px 7px;border-radius:99px">追加枠</span>'
        :s.isChanged
        ?'<span style="font-size:10px;background:#fef9c3;color:#a16207;font-weight:700;padding:2px 7px;border-radius:99px">変更済</span>'
        :'';
    const brkBadge=brk?`<span style="font-size:10px;background:#f3f4f6;color:#6b7280;padding:2px 6px;border-radius:99px">休憩 ${brk}</span>`:'';
    card.style.cssText=`background:white;border-radius:12px;border:1.5px solid ${bc};overflow:hidden;`;
    card.innerHTML=`
        <div class="view-text" style="display:flex;align-items:center;padding:11px 14px;gap:10px">
            <div class="time-mono" style="width:96px;min-width:96px;font-size:15px;font-weight:800;color:#1e293b;white-space:nowrap">${time||'未設定'}</div>
            <div style="flex:1;min-width:0">
                <div style="font-size:15px;font-weight:700;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
                <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px">${badge}${brkBadge}</div>
            </div>
        </div>
        <div class="edit-input" style="padding:12px 14px">
            <div style="font-size:12px;font-weight:700;color:#64748b;margin-bottom:8px">${s.name}</div>
            <div style="display:flex;gap:8px;margin-bottom:8px">
                <div style="flex:1">
                    <div style="font-size:10px;color:#94a3b8;margin-bottom:3px;font-weight:600">勤務時間</div>
                    <input type="text" value="${time}" class="time-input"
                        style="width:100%;border:1.5px solid #cbd5e1;border-radius:8px;padding:7px;font-size:14px;font-weight:700;text-align:center;box-sizing:border-box;font-family:monospace"
                        placeholder="9-18">
                </div>
                <div style="flex:1">
                    <div style="font-size:10px;color:#94a3b8;margin-bottom:3px;font-weight:600">休憩</div>
                    <input type="text" value="${brk}" class="brk-input"
                        style="width:100%;border:1.5px solid #cbd5e1;border-radius:8px;padding:7px;font-size:14px;font-weight:700;text-align:center;box-sizing:border-box;font-family:monospace"
                        placeholder="12:00-13:00">
                </div>
            </div>
            <div style="margin-bottom:8px">
                <div style="font-size:10px;color:#94a3b8;margin-bottom:3px;font-weight:600">名前</div>
                <input type="text" value="${s.name}" class="name-input"
                    style="width:100%;border:1.5px solid #cbd5e1;border-radius:8px;padding:7px;font-size:14px;font-weight:700;box-sizing:border-box">
            </div>
            <button onclick="deleteDaily('${s.id}',this)"
                style="width:100%;background:#fef2f2;color:#ef4444;border:1.5px solid #fca5a5;border-radius:8px;padding:7px;font-size:12px;font-weight:700;cursor:pointer">
                この枠を削除
            </button>
        </div>`;
    return card;
}

// ---- シフト読み込み ----
async function loadToday(){
    if(currentAbortController) currentAbortController.abort();
    currentAbortController = new AbortController();
    const signal = currentAbortController.signal;
    const d=getSelectedDate(), gasDate=toGasDate(d);
    const list=document.getElementById('shift-list'), counter=document.getElementById('counter'), editRow=document.getElementById('edit-toggle-row');
    list.innerHTML=''; editRow.classList.add('hidden');
    const cached=loadCache(cacheKey(gasDate), 5*60*1000);
    if(cached){ counter.innerHTML=buildBarChart(cached,isHoliday); renderShiftList(cached,list,editRow); return; }
    counter.innerHTML='<div style="font-size:12px;color:#9ca3af;text-align:center">読み込み中...</div>';
    try{
        const res=await fetch(GAS_URL+'?date='+gasDate,{signal});
        if(signal.aborted) return;
        const data=await res.json();
        saveCache(cacheKey(gasDate), data);
        counter.innerHTML=buildBarChart(data, isHoliday);
        renderShiftList(data, list, editRow);
    }catch(e){if(e.name==='AbortError')return; counter.innerHTML='<div style="color:#ef4444;font-size:12px;text-align:center">読み込みエラー</div>';}
}
function renderShiftList(data, list, editRow){
    list.innerHTML='';
    if(data.length===0){ list.innerHTML='<div class="text-center text-gray-400 text-sm py-8">この日のシフトはありません</div>'; }
    else{ editRow.classList.remove('hidden'); data.forEach(s=>list.appendChild(renderShiftCard(s))); }
    const addBtn=document.createElement('div');
    addBtn.style.marginTop='12px';
    addBtn.innerHTML=`<button onclick="addTodaySlot()"
        style="width:100%;font-size:14px;font-weight:700;color:#15803d;background:#f0fdf4;border:2px dashed #4ade80;border-radius:12px;padding:13px;cursor:pointer">
        ＋ 枠を追加</button>`;
    list.appendChild(addBtn);
}
async function addTodaySlot(){
    const time=prompt('勤務時間\n例: 9-18 や 6:30-15:00','9-18'); if(time===null)return;
    const brk=prompt('休憩時間（なければ空欄）\n例: 12:00-13:00',''); if(brk===null)return;
    const name=prompt('担当者名',''); if(name===null)return;
    clearCache(cacheKey(getCurrentGasDate()));
    await fetch(GAS_URL,{method:'POST',body:JSON.stringify({type:'addDaily',time,brk,name,date:getCurrentGasDate()})});
    loadToday();
}
async function deleteDaily(id,btn){
    if(!confirm('この枠を削除しますか？')) return;
    const card=btn.closest('[data-shift-id]');
    btn.disabled=true; btn.innerText='削除中...';
    clearCache(cacheKey(getCurrentGasDate()));
    await fetch(GAS_URL,{method:'POST',body:JSON.stringify({type:'deleteDaily',id,date:getCurrentGasDate()})});
    card.style.opacity='0.3';
    setTimeout(()=>loadToday(), 700);
}

// ======== 代行表 ========
function calMonthStr(y,m){ return y+'/'+String(m+1).padStart(2,'0'); }

async function loadDaikoMonth(){
    const ym=calMonthStr(calYear,calMonth);
    document.getElementById('cal-month-label').textContent=`${calYear}年${calMonth+1}月`;
    const cached=loadCache(daikoCacheKey(ym), 3*60*1000);
    if(cached){ daikoData=cached; renderCalendar(); return; }
    try{
        const res=await fetch(GAS_URL+'?mode=daiko&month='+ym);
        daikoData=await res.json();
        saveCache(daikoCacheKey(ym), daikoData);
    }catch(e){ daikoData=[]; }
    renderCalendar();
}
function changeCalMonth(delta){
    selectedDate=null; document.getElementById('daiko-detail').classList.add('hidden');
    calMonth+=delta;
    if(calMonth>11){calMonth=0;calYear++;}
    if(calMonth<0){calMonth=11;calYear--;}
    loadDaikoMonth();
}
function renderCalendar(){
    const grid=document.getElementById('cal-grid');
    grid.innerHTML='';
    const today=new Date();
    const firstDay=new Date(calYear,calMonth,1).getDay();
    const lastDate=new Date(calYear,calMonth+1,0).getDate();
    const dayMap={};
    daikoData.forEach(d=>{
        const day=parseInt(d.date.split('/')[2]);
        if(!dayMap[day]) dayMap[day]={募集中:0,決定:0};
        dayMap[day][d.status]=(dayMap[day][d.status]||0)+1;
    });
    for(let i=0;i<firstDay;i++){ grid.appendChild(document.createElement('div')); }
    for(let day=1;day<=lastDate;day++){
        const dateStr=calMonthStr(calYear,calMonth)+'/'+String(day).padStart(2,'0');
        const isToday=today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===day;
        const isSel=selectedDate===dateStr;
        const dow=(firstDay+day-1)%7;
        const cell=document.createElement('div');
        cell.className='cal-cell'+(isSel?' selected':'');
        const tc=dow===0?'#ef4444':dow===6?'#3b82f6':'#1e293b';
        let dots='';
        if(dayMap[day]){
            if(dayMap[day]['募集中']>0) dots+='<div style="width:6px;height:6px;border-radius:50%;background:#ef4444;display:inline-block;margin:0 1px"></div>';
            if(dayMap[day]['決定']>0)   dots+='<div style="width:6px;height:6px;border-radius:50%;background:#10b981;display:inline-block;margin:0 1px"></div>';
        }
        const dayItems=daikoData.filter(d=>parseInt(d.date.split('/')[2])===day);
        const timeTags=dayItems.slice(0,2).map(d=>{
            const col=d.status==='決定'?'#10b981':'#ef4444';
            const startT=(d.time||'').split('-')[0];
            return startT?`<div style="font-size:8px;color:${col};font-weight:700;line-height:1.3;text-align:center;overflow:hidden">${startT}~</div>`:'';
        }).join('');
        cell.innerHTML=`
            <div style="font-size:13px;font-weight:${isToday?'800':'700'};color:${tc};text-align:center;line-height:1.2">${day}</div>
            <div style="text-align:center;margin-top:1px">${dots}</div>
            ${timeTags}`;
        cell.onclick=()=>selectCalDay(dateStr,day);
        grid.appendChild(cell);
    }
}
function selectCalDay(dateStr,day){
    selectedDate=dateStr; renderCalendar();
    const dow=new Date(calYear,calMonth,day).getDay();
    const dayNames=['日','月','火','水','木','金','土'];
    document.getElementById('daiko-date-label').textContent=`${calYear}年${calMonth+1}月${day}日（${dayNames[dow]}）`;
    const detail=document.getElementById('daiko-detail');
    detail.classList.remove('hidden');
    const list=document.getElementById('daiko-list');
    const items=daikoData.filter(d=>d.date===dateStr);
    if(items.length===0){ list.innerHTML='<div class="text-center text-gray-400 text-sm py-4">この日の募集はありません</div>'; return; }
    list.innerHTML=items.map(d=>{
        const isDone=d.status==='決定';
        const dotColor=isDone?'#10b981':'#ef4444';
        const statusBadge=isDone
            ?`<span style="font-size:10px;background:#d1fae5;color:#065f46;font-weight:700;padding:2px 8px;border-radius:99px">代行決定：${d.applicantName}</span>`
            :`<span style="font-size:10px;background:#fef2f2;color:#dc2626;font-weight:700;padding:2px 8px;border-radius:99px">募集中</span>`;
        const applyBtn=isDone?'':
            `<button onclick="applyDaiko('${d.id}','${d.date}','${d.shiftId}','${d.time}')"
                style="margin-top:8px;width:100%;background:#2563eb;color:white;border:none;border-radius:8px;padding:8px;font-size:13px;font-weight:700;cursor:pointer">
                代行に入る</button>`;
        return `<div style="background:#f8fafc;border-radius:10px;padding:12px;border:1px solid #e2e8f0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
                <div style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0"></div>
                <div style="font-size:13px;font-weight:700;color:#1e293b" class="time-mono">${d.time}</div>
                <div style="flex:1;font-size:13px;font-weight:700;color:#475569">${d.requesterName}</div>
            </div>
            ${statusBadge}${applyBtn}
        </div>`;
    }).join('');
}
async function openCreateDaiko(){
    if(!selectedDate){alert('日付を選択してください');return;}
    let shiftData=[];
    try{ const res=await fetch(GAS_URL+'?date='+selectedDate); shiftData=await res.json(); }catch(e){}
    if(shiftData.length===0){ alert('この日のシフトデータがありません。\nシフト確認画面で確認してください。'); return; }
    const options=shiftData.map((s,i)=>`${i+1}: ${s.name}（${sanitizeTime(s.time)||'時間未設定'}）`).join('\n');
    const sel=prompt(`出られなくなった人を番号で選んでください：\n${options}`);
    if(sel===null)return;
    const idx=parseInt(sel)-1;
    if(isNaN(idx)||idx<0||idx>=shiftData.length){alert('正しい番号を入力してください');return;}
    const shift=shiftData[idx];
    if(!confirm(`以下の内容で募集を出しますか？\n日付：${selectedDate}\n名前：${shift.name}\n時間：${sanitizeTime(shift.time)||'不明'}`)) return;
    try{
        clearCache(daikoCacheKey(calMonthStr(calYear,calMonth)));
        await fetch(GAS_URL,{method:'POST',body:JSON.stringify({
            type:'createDaiko', date:selectedDate,
            shiftId:shift.id, requesterName:shift.name, time:sanitizeTime(shift.time)
        })});
        await loadDaikoMonth();
        selectCalDay(selectedDate,parseInt(selectedDate.split('/')[2]));
    }catch(e){alert('エラーが発生しました');}
}
async function applyDaiko(id, date, shiftId, time){
    const name=prompt('代行に入る人の名前を入力してください','');
    if(!name)return;
    if(!confirm(`「${name}」として代行申込みを確定しますか？`))return;
    try{
        // date/shiftId/time をフロントから直接送る（シートの型変換バグを回避）
        const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({
            type:'applyDaiko', id, applicantName:name,
            date, shiftId:String(shiftId), time:String(time)
        })});
        const text=await res.text();
        let affectedDate=date;
        try{ affectedDate=JSON.parse(text).affectedDate||date; }catch(e){}

        // キャッシュクリア
        clearCache(daikoCacheKey(calMonthStr(calYear,calMonth)));
        clearCache(cacheKey(affectedDate));

        await loadDaikoMonth();
        selectCalDay(selectedDate,parseInt(selectedDate.split('/')[2]));
    }catch(e){alert('エラーが発生しました：'+e.message);}
}

// ======== 固定シフト ========
function changeMasterDay(delta){ masterDayIndex=(masterDayIndex+delta+7)%7; renderMasterDay(); }
function jumpMasterDay(index){ masterDayIndex=index; renderMasterDay(); }
async function loadMaster(){
    document.getElementById('master-list').innerHTML='<div class="text-center text-gray-400 py-6 text-sm">読み込み中...</div>';
    const cached=loadCache(CACHE_MASTER_KEY, 30*60*1000);
    if(cached){ allMasterData=cached; renderMasterDay(); return; }
    const res=await fetch(GAS_URL+'?mode=allMaster');
    allMasterData=await res.json();
    saveCache(CACHE_MASTER_KEY, allMasterData);
    renderMasterDay();
}
function renderMasterDay(){
    const day=DAYS[masterDayIndex];
    document.getElementById('master-day-label').textContent=`${day}曜日`;
    DAYS.forEach((_,i)=>{
        const btn=document.getElementById(`day-btn-${i}`); if(!btn)return;
        const isSel=i===masterDayIndex, isSat=i===5, isSun=i===6;
        if(isSel)      btn.className='flex-1 py-1.5 rounded-lg text-xs font-bold transition border bg-blue-600 text-white border-blue-600';
        else if(isSun) btn.className='flex-1 py-1.5 rounded-lg text-xs font-bold transition border text-red-500 border-gray-200 hover:bg-red-50';
        else if(isSat) btn.className='flex-1 py-1.5 rounded-lg text-xs font-bold transition border text-blue-500 border-gray-200 hover:bg-blue-50';
        else           btn.className='flex-1 py-1.5 rounded-lg text-xs font-bold transition border text-gray-600 border-gray-200 hover:bg-gray-50';
    });
    const dayData=allMasterData.filter(d=>d.day===day);
    document.getElementById('master-counter').innerHTML=buildBarChart(dayData, false);
    const list=document.getElementById('master-list');
    if(dayData.length===0){ list.innerHTML='<div class="text-center text-gray-400 text-sm py-4">この曜日の枠はありません</div>'; return; }
    list.innerHTML=dayData.map(d=>{
        const t=sanitizeTime(d.time), brk=sanitizeTime(d.brk||'');
        return `<div class="bg-white rounded-xl shadow-sm border border-gray-200 p-3">
            <div style="display:flex;gap:6px;align-items:flex-end;margin-bottom:6px">
                <div style="flex:1"><div style="font-size:10px;color:#9ca3af;margin-bottom:3px">勤務時間</div>
                    <input type="text" value="${t}" class="m-time"
                        style="width:100%;border:1px solid #d1d5db;border-radius:8px;padding:6px 8px;font-size:13px;font-weight:700;text-align:center;font-family:monospace;box-sizing:border-box" placeholder="9-18"></div>
                <div style="flex:1"><div style="font-size:10px;color:#9ca3af;margin-bottom:3px">休憩</div>
                    <input type="text" value="${brk}" class="m-brk"
                        style="width:100%;border:1px solid #d1d5db;border-radius:8px;padding:6px 8px;font-size:13px;font-weight:700;text-align:center;font-family:monospace;box-sizing:border-box" placeholder="12:00-13:00"></div>
            </div>
            <div style="display:flex;gap:6px;align-items:flex-end">
                <div style="flex:1"><div style="font-size:10px;color:#9ca3af;margin-bottom:3px">名前</div>
                    <input type="text" value="${d.name}" class="m-name"
                        style="width:100%;border:1px solid #d1d5db;border-radius:8px;padding:6px 8px;font-size:13px;font-weight:700;box-sizing:border-box"></div>
                <button onclick="updateMaster('${d.row}',this)"
                    style="background:#374151;color:white;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0">保存</button>
            </div>
        </div>`;
    }).join('');
}
async function addMasterSlotCurrent(){
    const day=DAYS[masterDayIndex];
    const time=prompt(`${day}曜日・勤務時間\n例: 9-18 や 6:30-15:00`,'9-18'); if(time===null)return;
    const brk=prompt('休憩時間（なければ空欄）\n例: 12:00-13:00',''); if(brk===null)return;
    const name=prompt('担当者名','未定'); if(name===null)return;
    clearCache(CACHE_MASTER_KEY);
    const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({type:'addMaster',day,time,brk,name,pass:savedAdminPass})});
    if(await res.text()==='auth_error'){alert('セッション切れです。再読み込みしてください。');location.reload();return;}
    await loadMaster();
}
async function updateMaster(row,btn){
    const card=btn.closest('.bg-white.rounded-xl');
    const time=card.querySelector('.m-time').value, brk=card.querySelector('.m-brk').value, name=card.querySelector('.m-name').value;
    const orig=btn.innerText; btn.innerText='⏳'; btn.disabled=true;
    clearCache(CACHE_MASTER_KEY);
    const res=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({type:'directMaster',row,time,brk,name,pass:savedAdminPass})});
    if(await res.text()==='auth_error'){alert('セッション切れです。再読み込みしてください。');location.reload();return;}
    const idx=allMasterData.findIndex(d=>String(d.row)===String(row));
    if(idx>=0){allMasterData[idx].time=time;allMasterData[idx].brk=brk;allMasterData[idx].name=name;}
    saveCache(CACHE_MASTER_KEY,allMasterData);
    btn.innerText='完了!'; btn.style.background='#16a34a';
    setTimeout(()=>{btn.innerText=orig;btn.style.background='#374151';btn.disabled=false;},1500);
}

loadToday();
</script>
